base_config: configs/default.yaml

rank:
  processed:
    user_features_file: user_features.parquet
    item_features_file: item_features.parquet
    user_sequences_file: user_sequences.parquet
    splits_dir: splits

  input:
    prerank_dir: prerank
    train_topk_file: train_topk.parquet
    val_topk_file: val_topk.parquet
    test_topk_file: test_topk.parquet

  output:
    rank_dir: rank
    metrics_dir: metrics
    best_model_file: best_model.pt
    train_ranked_file: train_ranked.parquet
    val_ranked_file: val_ranked.parquet
    test_ranked_file: test_ranked.parquet
    metrics_file: rank_metrics.json

  tasks: [long_watch, finish, like]
  task_weights:
    long_watch: 1.0
    finish: 0.8
    like: 1.2
  rank_score_weights:
    long_watch: 0.45
    finish: 0.25
    like: 0.30

  sampling:
    enabled: true
    train_negative_sample_ratio: 4
    val_negative_sample_ratio: 8
    max_negative_per_user: 80
    random_seed: 2026

  sequence:
    max_seq_len: 50
    history_positive_only: true
    history_label_col: is_positive
    exclude_target_from_history: true

  features:
    source_names: [popular, itemcf, twotower, twotower_faiss, graph_emb]
    source_score_default: 0.0
    source_rank_default: 1000000
    split_reference_dates:
      train: 20220424
      val: 20220430
      test: 20220508
    user_categorical_cols:
      - user_active_degree
      - follow_user_num_range
      - fans_user_num_range
      - friend_user_num_range
      - register_days_range
    user_numeric_cols:
      - is_lowactive_period
      - is_live_streamer
      - is_video_author
      - follow_user_num
      - fans_user_num
      - friend_user_num
      - register_days
      - onehot_feat0
      - onehot_feat1
      - onehot_feat2
      - onehot_feat3
      - onehot_feat4
      - onehot_feat5
      - onehot_feat6
      - onehot_feat7
      - onehot_feat8
      - onehot_feat9
      - onehot_feat10
      - onehot_feat11
      - onehot_feat12
      - onehot_feat13
      - onehot_feat14
      - onehot_feat15
      - onehot_feat16
      - onehot_feat17
    item_categorical_cols:
      - author_id
      - tag
      - video_type
      - upload_type
      - visible_status
      - music_type
    item_numeric_cols:
      - video_duration
      - server_width
      - server_height
      - counts
      - show_cnt
      - play_cnt
      - complete_play_cnt
      - valid_play_cnt
      - long_time_play_cnt
      - like_cnt
      - comment_cnt
      - share_cnt
      - collect_cnt
      - play_progress

  model:
    type: din_multitask
    embedding_dim: 64
    other_cat_embedding_dim: 8
    numeric_projection_dim: 64
    attention_hidden_dims: [128, 64]
    shared_hidden_dims: [256, 128]
    task_hidden_dims: [64]
    dropout: 0.15
    batch_size: 8192
    num_workers: 2
    epochs: 4
    learning_rate: 0.001
    weight_decay: 0.000001
    grad_clip_norm: 5.0
    early_stopping_patience: 2
    device: auto

  eval:
    topk: [10, 20]
    mrr_k: 10

  inference:
    splits: [val, test]
    candidate_batch_rows: 300000
    predict_batch_size: 8192
    save_train_ranked: false
    keep_columns:
      - user_id
      - video_id
      - recall_source
      - merged_score
      - source_count
      - merged_rank
      - coarse_score
      - coarse_rank
      - label
